<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'urn:fontconfig:fonts.dtd'>
<fontconfig>

  <alias>
    <family>sans-serif</family>
    <prefer><family>NotoSans Nerd Font</family></prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer><family>NotoSerif Nerd Font</family></prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer><family>IosevkaTerm Nerd Font</family></prefer>
  </alias>

  <alias>
    <family>emoji</family>
    <prefer><family>Noto Color Emoji</family></prefer>
  </alias>

</fontconfig>
