# line, bar
timeline_style=bar

timeline_line_width=2
timeline_size=40
timeline_border=1

# comma separated
# paused, audio, image, video, idle, windowed, fullscreen
timeline_persistency=

# seek the timeline with the scroll wheel
# `5!` for exact seeks
timeline_step=5

timeline_cache=yes
timeline_heatmap=overlay

# minimized timeline
# windowed, fullscreen, always, never
progress=windowed
progress_size=4
progress_line_width=20

# set's the ui, defaults are good
controls=menu,gap,<video,audio>subtitles,<has_many_audio>audio,<has_many_video>video,<has_many_edition>editions,<stream>stream-quality,gap,space,<video,audio>speed,space,shuffle,loop-playlist,loop-file,gap,prev,items,next,gap,fullscreen
controls_size=32
controls_margin=8
controls_spacing=2
controls_persistency=

# none, left, right
volume=right
volume_size=40
volume_border=1
volume_step=1
volume_persistency=

# playback speed
# mouse drag or wheel to change, click to reset
speed_step=0.1
speed_step_is_factor=no
speed_persistency=

menu_item_height=36
menu_min_width=260
menu_padding=4
menu_type_to_search=yes

# window controls and media title
# never, no-border, always
top_bar=no-border
top_bar_size=40
# no, left, right
top_bar_controls=right
# no, yes, custom template string
top_bar_title=${media-title}
top_bar_alt_title=${filename}
# below, toggle
top_bar_alt_title_place=below
# audio,video,image,chapter
top_bar_flash_on=video,audio
top_bar_persistency=

window_border_size=1

# if there's no playlist and file ends, load next file in directory
autoload=no
shuffle=no

scale=1
scale_fullscreen=1.3
font_scale=1
text_border=1.2
border_radius=4

# defaults are OK
color=
opacity=
refine=

animation_duration=100
flash_duration=1000
proximity_in=40
proximity_out=120
font_bold=no
destination_time=playtime-remaining
time_precision=0
buffered_time_threshold=60
autohide=no
pause_indicator=flash

stream_quality_options=4320,2160,1440,1080,720,480,360,240,144

video_types=3g2,3gp,asf,avi,f4v,flv,h264,h265,m2ts,m4v,mkv,mov,mp4,mp4v,mpeg,mpg,ogm,ogv,rm,rmvb,ts,vob,webm,wmv,y4m
audio_types=aac,ac3,aiff,ape,au,cue,dsf,dts,flac,m4a,mid,midi,mka,mp3,mp4a,oga,ogg,opus,spx,tak,tta,wav,weba,wma,wv
image_types=apng,avif,bmp,gif,j2k,jp2,jfif,jpeg,jpg,jxl,mj2,png,svg,tga,tif,tiff,webp
subtitle_types=aqt,ass,gsub,idx,jss,lrc,mks,pgs,pjs,psb,rt,sbv,slt,smi,sub,sup,srt,ssa,ssf,ttxt,txt,usf,vt,vtt
playlist_types=m3u,m3u8,pls,url,cue

load_types=video,audio,image
default_directory=~/
show_hidden_files=no

# depends on trash-cli
use_trash=no

adjust_osd_margins=yes
chapter_ranges=openings:30abf964,endings:30abf964,ads:c54e4e80
# alternative patterns to identify beginnings of simple chapter ranges (except for `ads`)
# Syntax: `{type}:{pattern}[,{patternN}][;{type}:{pattern}[,{patternN}]]`
chapter_range_patterns=openings:オープニング;endings:エンディング

languages=slang,ua,en
# subtitles are downloaded into the directory of currently opened file
# if the file is being played from a URL, use this directory instead (expands to `{mpv_config_dir}/subtitles`)
# Prefix the path with `!` to force all subtitles to be saved there. Example: `!~~/subtitles`
subtitles_directory=~/videos/subtitles

# window_border, top_bar, timeline, controls, volume, idle_indicator, audio_indicator, buffering_indicator, pause_indicator
disable_elements=
