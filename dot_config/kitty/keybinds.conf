clear_all_shortcuts yes
map ctrl+f1 load_config_file
map ctrl+f2 debug_config

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

map ctrl+shift+minus change_font_size all -2.0
map ctrl+shift+equal change_font_size all +2.0

map --new-mode command --on-action end ctrl+b
map --mode command esc pop_keyboard_mode

map --mode command c new_tab_with_cwd
map --mode command x close_window

map --mode command h launch --location=hsplit --cwd current
map --mode command v launch --location=vsplit --cwd current

map --mode command 1 goto_tab 1
map --mode command 2 goto_tab 2
map --mode command 3 goto_tab 3
map --mode command 4 goto_tab 4
map --mode command 5 goto_tab 5
map --mode command 6 goto_tab 6
map --mode command 7 goto_tab 7
map --mode command 8 goto_tab 8
map --mode command 9 goto_tab 9
map --mode command 0 goto_tab 10

map --mode command p kitten hints --type path --program wl-copy
map --mode command f kitten hints --type path --program yazi
map --mode command l kitten hints --type hyperlink --program yazi

map --mode command --new-mode launch --on-action end l
map --mode launch d launch --type=overlay --cwd current gdu
map --mode launch g launch --type=overlay --cwd current lazygit
map --mode launch y launch --type=overlay --cwd current yazi
